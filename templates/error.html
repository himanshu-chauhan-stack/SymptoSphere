{% extends "base.html" %}

{% block content %}
<section class="error-shell reveal-up">
    <h1>{{ error_title }}</h1>
    <p>{{ error_message }}</p>
    {% if error_details %}
        <pre class="error-details">{{ error_details }}</pre>
    {% endif %}
    <div class="hero-actions">
        <a class="btn btn-primary" href="{{ url_for('index') }}" data-i18n-key="go_home">Go Home</a>
        <a class="btn btn-ghost" href="{{ url_for('predict') }}" data-i18n-key="try_again">Try Again</a>
    </div>
</section>
{% endblock %}
